<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Signals Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 20px;
        }

        /* Profile image neon glow effect */
        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            box-shadow: 0 0 25px #38bdf8, inset 0 0 15px #38bdf8;
            padding: 4px;
            background: transparent;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* Typography styles */
        .main-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 600;
            color: #38bdf8; /* Cyan Blue Accent */
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .description {
            font-size: 14px;
            color: #a3a3a3;
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 0 15px;
        }

        /* Telegram button with hover glow effect */
        .btn-telegram {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 320px;
            padding: 16px;
            background: linear-gradient(to right, #7dd3fc, #38bdf8, #0284c7);
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            margin-bottom: 40px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-telegram:active {
            transform: scale(0.98);
        }

        /* Countdown timer container styling */
        .offer-box {
            border: 2px solid #0284c7;
            border-radius: 20px;
            padding: 25px 15px;
            margin-bottom: 40px;
            box-shadow: 0 0 15px rgba(2, 132, 199, 0.3), inset 0 0 10px rgba(2, 132, 199, 0.2);
        }

        .offer-title {
            font-size: 16px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .time-block {
            border: 2px solid #38bdf8;
            border-radius: 12px;
            width: 75px;
            padding: 12px 0;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .time-number {
            font-size: 26px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .time-label {
            font-size: 11px;
            color: #737373;
            display: block;
        }

        /* Footer credits */
        .footer {
            font-size: 12px;
            color: #525252;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-container">
            <img src="https://kommodo.ai/i/lkIDTzVHUpMVlytRMjzA" alt="Profile Picture" class="profile-img" id="profilePic">
        </div>

        <h1 class="main-title" id="mainName">TEAM YOUNG GOAT</h1>

        <div class="subtitle">
            <span id="subTitleText">Premium Signals & Insights</span> 🔥
        </div>

        <p class="description" id="descText">
            Join our exclusive Telegram community for daily updates, signals & market insights.
        </p>

        <a href="https://t.me/+7pC3S-2mK5ZmZmU1" class="btn-telegram" id="tgLink">
            🚀 JOIN TELEGRAM NOW
        </a>

        <div class="offer-box">
            <div class="offer-title">
                ⚡ Limited Offer Ends In ⚡
            </div>
            <div class="countdown-container">
                <div class="time-block">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">Min</span>
                </div>
                <div class="time-block">
                    <span class="time-number" id="seconds">05</span>
                    <span class="time-label">Sec</span>
                </div>
            </div>
        </div>

        <div class="footer" id="footerText">
            Managed by @ahtesham khan
        </div>

    </div>

    <script>
        let timeLeft = 5; // Configured duration in seconds
        const minutesDisplay = document.getElementById('minutes');
        const secondsDisplay = document.getElementById('seconds');

        const countdown = setInterval(() => {
            timeLeft--;

            // Format seconds to double digits (e.g., 04, 03)
            let seconds = timeLeft % 60;
            secondsDisplay.textContent = seconds < 10 ? '0' + seconds : seconds;

            if (timeLeft <= 0) {
                clearInterval(countdown);
            }
        }, 1000);
    </script>

</body>
</html>
